
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>LIFTIQ — Squat Tracker</title>
<link rel="manifest" href="manifest.json" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#0a0a0a;--surface:#111318;--raised:#1c1f27;--border:#2a2e3a;
  --volt:#e8ff47;--danger:#ff3d3d;--teal:#00e5c8;--muted:#888ca0;--text:#e8eaf0;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--void);color:var(--text);font-family:var(--font-body);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Shell ── */
#app{display:grid;grid-template-rows:48px 1fr auto;height:100dvh;max-width:480px;margin:0 auto;position:relative}

/* ── Topbar ── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--border);background:var(--surface);z-index:10;gap:8px}
#logo{font-family:var(--font-display);font-weight:900;font-size:22px;letter-spacing:0.08em;color:var(--volt);flex-shrink:0}
#logo span{color:var(--text)}
.top-btn{background:var(--raised);border:1px solid var(--border);color:var(--muted);font-size:15px;height:32px;padding:0 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-body);font-size:12px;white-space:nowrap;transition:color .2s,border-color .2s}
.top-btn:hover{color:var(--volt);border-color:var(--volt)}
.top-btn.active{color:var(--volt);border-color:var(--volt)}
#topbar-right{display:flex;gap:6px;align-items:center}

/* ── Camera ── */
#camera-wrap{position:relative;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;pointer-events:none}

/* ── Countdown overlay ── */
#countdown-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);
  pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:5;
}
#countdown-overlay.visible{opacity:1}
#countdown-num{
  font-family:var(--font-display);font-weight:900;font-size:120px;
  line-height:1;color:var(--volt);
  text-shadow:0 0 40px rgba(232,255,71,0.4);
  animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#countdown-label{font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:0.15em;color:var(--text);margin-top:8px}

/* ── Phase ribbon ── */
#phase-ribbon{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-family:var(--font-display);font-weight:700;font-size:13px;
  letter-spacing:0.14em;text-transform:uppercase;
  padding:5px 14px;border-radius:4px;
  background:rgba(10,10,10,0.7);border:1px solid var(--border);color:var(--muted);
  transition:color .15s,border-color .15s;backdrop-filter:blur(6px);pointer-events:none;
}
#phase-ribbon.phase-descending{color:#ffc107;border-color:#ffc107}
#phase-ribbon.phase-depth{color:var(--volt);border-color:var(--volt)}
#phase-ribbon.phase-ascending{color:var(--teal);border-color:var(--teal)}

/* ── Knee chip ── */
#knee-chip{
  position:absolute;bottom:12px;left:12px;
  background:rgba(10,10,10,0.72);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;backdrop-filter:blur(6px);pointer-events:none;
}
#knee-chip .kval{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--teal)}
#knee-chip .klabel{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:1px}

/* ── Weight chip (camera overlay) ── */
#weight-chip{
  position:absolute;bottom:12px;right:12px;
  background:rgba(10,10,10,0.72);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;backdrop-filter:blur(6px);pointer-events:none;
}
#weight-chip .wval{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--volt)}
#weight-chip .wlabel{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:1px}

/* ── Bottom panel ── */
#panel{background:var(--surface);border-top:1px solid var(--border);padding:12px 14px calc(12px + var(--safe-bottom));display:flex;flex-direction:column;gap:10px}

/* ── Weight row ── */
#weight-row{display:flex;gap:8px;align-items:center}
#weight-input{
  flex:1;background:var(--raised);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:16px;font-weight:600;
  border-radius:7px;padding:8px 12px;outline:none;
  transition:border-color .2s;
}
#weight-input:focus{border-color:var(--volt)}
#weight-input::placeholder{color:var(--muted)}
#unit-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.unit-btn{
  background:var(--raised);color:var(--muted);border:none;
  font-family:var(--font-display);font-weight:700;font-size:14px;
  padding:8px 14px;cursor:pointer;transition:background .15s,color .15s;
}
.unit-btn.active{background:var(--volt);color:#000}

/* ── Metrics ── */
#metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.metric-card{background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:9px 6px 7px;text-align:center}
.metric-val{font-family:var(--font-display);font-weight:700;font-size:26px;line-height:1;color:var(--text);letter-spacing:-0.01em}
.metric-val.volt{color:var(--volt)}.metric-val.teal{color:var(--teal)}.metric-val.danger{color:var(--danger)}
.metric-label{font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ── RPE bar ── */
#rpe-wrap{display:flex;flex-direction:column;gap:5px}
#rpe-header{display:flex;justify-content:space-between;align-items:baseline}
#rpe-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
#rpe-value{font-family:var(--font-display);font-weight:900;font-size:20px;color:var(--volt)}
#rpe-desc{font-size:11px;color:var(--muted)}
#rpe-track{height:10px;background:var(--raised);border-radius:2px;overflow:hidden;position:relative}
#rpe-track::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0px,transparent 18px,rgba(0,0,0,0.35) 18px,rgba(0,0,0,0.35) 20px);pointer-events:none}
#rpe-fill{height:100%;width:0%;background:var(--volt);border-radius:2px;transition:width .6s cubic-bezier(0.16,1,0.3,1),background .4s}

/* ── Tabs ── */
#tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.tab-btn{flex:1;background:var(--raised);color:var(--muted);border:none;font-family:var(--font-body);font-size:12px;font-weight:500;padding:7px;cursor:pointer;transition:background .15s,color .15s}
.tab-btn.active{background:var(--raised);color:var(--volt);border-bottom:2px solid var(--volt)}

/* ── Rep history ── */
#tab-current,#tab-history{display:none}
#tab-current.visible,#tab-history.visible{display:block}
#history-wrap,#full-history-wrap{max-height:90px;overflow-y:auto;border-radius:6px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#rep-table,#full-history-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px}
#rep-table thead th,#full-history-table thead th{position:sticky;top:0;background:var(--raised);color:var(--muted);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-family:var(--font-body);font-weight:600;padding:5px 7px;text-align:right;border-bottom:1px solid var(--border)}
#rep-table thead th:first-child,#full-history-table thead th:first-child{text-align:left}
#rep-table tbody td,#full-history-table tbody td{padding:4px 7px;text-align:right;color:var(--text);border-bottom:1px solid rgba(255,255,255,0.04)}
#rep-table tbody td:first-child,#full-history-table tbody td:first-child{text-align:left;color:var(--muted)}
.rpe-high{color:var(--danger)}.rpe-med{color:#ffc107}.rpe-ok{color:var(--teal)}

/* ── Actions ── */
#actions{display:grid;grid-template-columns:1fr auto;gap:8px}
#btn-start{background:var(--volt);color:#000;border:none;border-radius:8px;font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:0.06em;padding:12px;cursor:pointer;transition:opacity .15s,transform .1s}
#btn-start:active{transform:scale(0.98);opacity:0.85}
#btn-start:disabled{opacity:0.5;cursor:not-allowed}
#btn-reset{background:var(--raised);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:13px;padding:12px 14px;cursor:pointer;transition:color .15s,border-color .15s}
#btn-reset:hover{color:var(--danger);border-color:var(--danger)}

/* ── Loading ── */
#loading-screen{position:fixed;inset:0;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
#loading-logo{font-family:var(--font-display);font-weight:900;font-size:48px;letter-spacing:0.1em;color:var(--volt)}
#loading-logo span{color:var(--text)}
#loading-status{font-size:13px;color:var(--muted);font-family:var(--font-mono)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--volt);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(60px);background:var(--raised);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 18px;border-radius:8px;white-space:nowrap;transition:transform .3s cubic-bezier(0.16,1,0.3,1),opacity .3s;opacity:0;z-index:200;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>

<div id="loading-screen">
  <div id="loading-logo">LIFT<span>IQ</span></div>
  <div class="spinner"></div>
  <div id="loading-status">MediaPipe 로딩 중…</div>
</div>

<div id="toast"></div>

<div id="app">
  <header id="topbar">
    <div id="logo">LIFT<span>IQ</span></div>
    <div id="topbar-right">
      <button class="top-btn" id="btn-cam-front" title="전면 카메라">🤳 전면</button>
      <button class="top-btn" id="btn-cam-rear" title="후면 카메라">📷 후면</button>
    </div>
  </header>

  <div id="camera-wrap">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
      <div id="countdown-num">4</div>
      <div id="countdown-label">카메라 앞에 서주세요</div>
    </div>

    <div id="phase-ribbon">대기 중</div>
    <div id="knee-chip">
      <div class="kval" id="knee-val">—°</div>
      <div class="klabel">무릎 각도</div>
    </div>
    <div id="weight-chip">
      <div class="wval" id="weight-display">— kg</div>
      <div class="wlabel">무게</div>
    </div>
  </div>

  <section id="panel">
    <!-- Weight input -->
    <div id="weight-row">
      <input type="number" id="weight-input" placeholder="무게 입력" min="0" max="999" step="0.5" />
      <div id="unit-toggle">
        <button class="unit-btn active" data-unit="kg">kg</button>
        <button class="unit-btn" data-unit="lb">lb</button>
      </div>
    </div>

    <!-- Metrics -->
    <div id="metrics">
      <div class="metric-card"><div class="metric-val volt" id="m-reps">0</div><div class="metric-label">REPS</div></div>
      <div class="metric-card"><div class="metric-val" id="m-time">—</div><div class="metric-label">컨센트릭(s)</div></div>
      <div class="metric-card"><div class="metric-val teal" id="m-vloss">0%</div><div class="metric-label">속도손실</div></div>
      <div class="metric-card"><div class="metric-val" id="m-mean">—</div><div class="metric-label">세트평균</div></div>
    </div>

    <!-- RPE -->
    <div id="rpe-wrap">
      <div id="rpe-header">
        <span id="rpe-label">RPE 추정</span>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span id="rpe-desc">—</span>
          <span id="rpe-value">—</span>
        </div>
      </div>
      <div id="rpe-track"><div id="rpe-fill"></div></div>
    </div>

    <!-- Tabs -->
    <div id="tabs">
      <button class="tab-btn active" data-tab="current">이번 세트</button>
      <button class="tab-btn" data-tab="history">기록 보기</button>
    </div>

    <!-- Tab: current set -->
    <div id="tab-current" class="visible">
      <div id="history-wrap">
        <table id="rep-table">
          <thead><tr><th>REP</th><th>시간(s)</th><th>무릎∠</th><th>속도손실</th><th>RPE</th></tr></thead>
          <tbody id="rep-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: full history -->
    <div id="tab-history">
      <div id="full-history-wrap">
        <table id="full-history-table">
          <thead><tr><th>날짜/세트</th><th>무게</th><th>렙수</th><th>평균(s)</th><th>RPE</th></tr></thead>
          <tbody id="full-history-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Actions -->
    <div id="actions">
      <button id="btn-start">▶ 세트 시작</button>
      <button id="btn-reset">초기화</button>
    </div>
  </section>
</div>

<script type="module">
import {
  PoseLandmarker, FilesetResolver, DrawingUtils
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const LM = { HIP_L:23, HIP_R:24, KNEE_L:25, KNEE_R:26, ANKLE_L:27, ANKLE_R:28 };
const HIP_BELOW_KNEE_MARGIN = 0.015;
const COUNTDOWN_SEC = 4;

const RPE_TABLE = [
  {loss:0,  rpe:6.0, label:'매우 쉬움'},
  {loss:5,  rpe:6.5, label:'쉬움'},
  {loss:10, rpe:7.0, label:'보통'},
  {loss:15, rpe:7.5, label:'조금 힘듦'},
  {loss:20, rpe:8.0, label:'힘듦'},
  {loss:25, rpe:8.5, label:'많이 힘듦'},
  {loss:30, rpe:9.0, label:'거의 한계'},
  {loss:40, rpe:9.5, label:'한계 직전'},
  {loss:50, rpe:10,  label:'최대'},
];

const Phase = Object.freeze({
  WAITING:'WAITING', DESCENDING:'DESCENDING', DEPTH:'DEPTH', ASCENDING:'ASCENDING'
});

// ═══════════════════════════════════════════════════════════
// GEOMETRY
// ═══════════════════════════════════════════════════════════
function angleDeg(A,B,C) {
  const BAx=A.x-B.x,BAy=A.y-B.y,BCx=C.x-B.x,BCy=C.y-B.y;
  const dot=BAx*BCx+BAy*BCy;
  const mag=Math.hypot(BAx,BAy)*Math.hypot(BCx,BCy);
  return mag===0?180:Math.acos(Math.max(-1,Math.min(1,dot/mag)))*(180/Math.PI);
}
function mid(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}

// Exponential moving average — smooths landmark jitter
class EMA {
  constructor(alpha=0.35){this.alpha=alpha;this.val=null}
  update(v){this.val=this.val===null?v:this.alpha*v+(1-this.alpha)*this.val;return this.val}
  reset(){this.val=null}
}

function lookupRPE(loss) {
  const t=RPE_TABLE;
  if(loss<=t[0].loss) return t[0];
  if(loss>=t[t.length-1].loss) return t[t.length-1];
  for(let i=1;i<t.length;i++){
    if(loss<=t[i].loss){
      const r=(loss-t[i-1].loss)/(t[i].loss-t[i-1].loss);
      return {rpe:+(t[i-1].rpe+r*(t[i].rpe-t[i-1].rpe)).toFixed(1),label:t[i-1].label};
    }
  }
  return t[t.length-1];
}

// ═══════════════════════════════════════════════════════════
// SQUAT TRACKER
// ═══════════════════════════════════════════════════════════
class SquatTracker {
  constructor(onRep){
    this.onRep=onRep;
    this.repHistory=[];
    // EMA smoothers for hip and knee Y
    this._hipEMA  = new EMA(0.3);
    this._kneeEMA = new EMA(0.3);
    // Velocity smoother (hip Y delta per frame)
    this._velEMA  = new EMA(0.25);
    this._reset();
  }

  update(lm, now=performance.now()) {
    if(!lm||lm.length<29) return null;

    const hipL=lm[LM.HIP_L],hipR=lm[LM.HIP_R];
    const kneeL=lm[LM.KNEE_L],kneeR=lm[LM.KNEE_R];
    const ankleL=lm[LM.ANKLE_L],ankleR=lm[LM.ANKLE_R];

    // Check landmark visibility — skip if joints not visible
    const minVis=0.4;
    if((hipL.visibility??1)<minVis||(hipR.visibility??1)<minVis||
       (kneeL.visibility??1)<minVis||(kneeR.visibility??1)<minVis) return null;

    const rawHip  = mid(hipL,hipR);
    const rawKnee = mid(kneeL,kneeR);

    // Smooth positions
    const hipY  = this._hipEMA.update(rawHip.y);
    const kneeY = this._kneeEMA.update(rawKnee.y);
    const hip   = {x:rawHip.x, y:hipY};
    const knee  = {x:rawKnee.x,y:kneeY};

    // Velocity (Y per ms, positive = downward)
    let vel=0;
    if(this._prev){
      const dt=(now-this._prev.now)||1;
      vel=this._velEMA.update((hipY-this._prev.hipY)/dt);
    }

    const kneeAngleL=angleDeg(hipL,kneeL,ankleL);
    const kneeAngleR=angleDeg(hipR,kneeR,ankleR);
    const kneeAngle=(kneeAngleL+kneeAngleR)/2;

    // Powerlifting depth: hip crease below knee
    const atDepth = hipY > kneeY + HIP_BELOW_KNEE_MARGIN;
    const hipDelta = hipY - kneeY;

    this._fsm({hip,knee,hipY,kneeY,kneeAngle,atDepth,hipDelta,vel,now});
    this._prev={hipY,kneeY,now};

    return {
      phase:this._phase,kneeAngleL,kneeAngleR,kneeAngle,
      atDepth,hipDelta,hip,knee,vel,
      repCount:this.repHistory.length,
      setMean:+this._setMean.toFixed(3),
      lastRep:this.repHistory[this.repHistory.length-1]??null,
    };
  }

  resetSet(){
    this.repHistory=[];
    this._hipEMA.reset();
    this._kneeEMA.reset();
    this._velEMA.reset();
    this._reset();
  }

  _reset(){
    this._phase=Phase.WAITING;this._prev=null;
    this._depthKneeAngle=180;this._depthHipDelta=0;
    this._ascentStart=null;this._lockout=0;this._setMean=0;
    // Require N consecutive frames for each state transition (debounce)
    this._descentFrames=0;
    this._ascentFrames=0;
  }

  _fsm({hipY,atDepth,hipDelta,kneeAngle,vel,now}){
    // vel > 0 = moving down, vel < 0 = moving up
    switch(this._phase){

      case Phase.WAITING:
        // Need consistent downward movement to start
        if(vel>0.00015){
          this._descentFrames++;
          if(this._descentFrames>=4){this._phase=Phase.DESCENDING;this._descentFrames=0}
        } else {
          this._descentFrames=Math.max(0,this._descentFrames-1);
        }
        break;

      case Phase.DESCENDING:
        if(atDepth){
          this._phase=Phase.DEPTH;
          this._depthKneeAngle=kneeAngle;
          this._depthHipDelta=hipDelta;
        }
        // False start — hip went back up quickly without reaching depth
        if(vel<-0.0003){
          this._descentFrames++;
          if(this._descentFrames>=6){this._phase=Phase.WAITING;this._descentFrames=0}
        } else {
          this._descentFrames=0;
        }
        break;

      case Phase.DEPTH:
        // Track deepest point
        if(hipDelta>this._depthHipDelta){
          this._depthHipDelta=hipDelta;
          this._depthKneeAngle=kneeAngle;
        }
        // Transition to ascending when hip clears knee
        if(!atDepth){
          this._ascentFrames++;
          if(this._ascentFrames>=3){
            this._phase=Phase.ASCENDING;
            this._ascentStart=now;
            this._ascentFrames=0;
            this._lockout=0;
          }
        } else {
          this._ascentFrames=0;
        }
        break;

      case Phase.ASCENDING:
        // Dropped back to depth — false ascent
        if(atDepth){this._phase=Phase.DEPTH;this._lockout=0;break}
        this._lockout++;
        // Lockout confirmed after N frames above knee AND velocity near zero
        if(this._lockout>=6 && Math.abs(vel)<0.0004){
          const dur=(now-this._ascentStart)/1000;
          if(dur>=0.2&&dur<=8) this._completeRep(dur,now);
          this._phase=Phase.WAITING;
          this._lockout=0;
        }
        break;
    }
  }

  _completeRep(dur,now){
    const n=this.repHistory.length+1;
    const prevMean=this._setMean;
    this._setMean=prevMean+(1/n)*(dur-prevMean);
    const lossPercent=n===1?0:Math.max(0,((dur-prevMean)/prevMean)*100);
    const {rpe,label}=lookupRPE(lossPercent);
    const rep={
      repNumber:n,
      concentricDuration:+dur.toFixed(3),
      kneeAngleAtDepth:+this._depthKneeAngle.toFixed(1),
      hipDepthDelta:+this._depthHipDelta.toFixed(4),
      velocityLoss:+lossPercent.toFixed(1),
      rpe,rpeLabel:label,timestamp:now,
    };
    this.repHistory.push(rep);
    this.onRep?.(rep,[...this.repHistory]);
  }
}

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
const $=s=>document.querySelector(s);
const video=$('#video'),canvas=$('#overlay'),ctx=canvas.getContext('2d');
const loadScr=$('#loading-screen'),loadStat=$('#loading-status');
const phaseRib=$('#phase-ribbon'),kneeVal=$('#knee-val');
const weightDisplay=$('#weight-display');
const mReps=$('#m-reps'),mTime=$('#m-time'),mVloss=$('#m-vloss'),mMean=$('#m-mean');
const rpeValue=$('#rpe-value'),rpeDesc=$('#rpe-desc'),rpeFill=$('#rpe-fill');
const repTbody=$('#rep-tbody'),fullHistTbody=$('#full-history-tbody');
const btnStart=$('#btn-start'),btnReset=$('#btn-reset');
const countdownOverlay=$('#countdown-overlay'),countdownNum=$('#countdown-num');
const weightInput=$('#weight-input');
const toastEl=$('#toast');

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let poseLandmarker=null,drawingUtils=null,stream=null;
let tracking=false,rafId=null,lastVideoTime=-1;
let facingMode='environment'; // default rear camera
let weightKg=null,weightUnit='kg';
let countingDown=false;

// ═══════════════════════════════════════════════════════════
// HISTORY (localStorage)
// ═══════════════════════════════════════════════════════════
const HISTORY_KEY='liftiq_history_v1';

function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}
  catch{return [];}
}
function saveSession(session){
  const h=loadHistory();
  h.unshift(session);
  // Keep last 60 sessions
  localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,60)));
}
function renderFullHistory(){
  const h=loadHistory();
  fullHistTbody.innerHTML='';
  if(!h.length){
    fullHistTbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:12px">기록 없음</td></tr>';
    return;
  }
  h.forEach(s=>{
    const tr=document.createElement('tr');
    const rpeClass=s.maxRpe>=9?'rpe-high':s.maxRpe>=8?'rpe-med':'rpe-ok';
    tr.innerHTML=`
      <td>${s.date}<br><span style="font-size:9px;color:var(--muted)">${s.time}</span></td>
      <td>${s.weight||'—'}</td>
      <td>${s.repCount}</td>
      <td>${s.avgDuration}</td>
      <td class="${rpeClass}">${s.maxRpe}</td>
    `;
    fullHistTbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════════════════════════
// TRACKER
// ═══════════════════════════════════════════════════════════
const tracker = new SquatTracker((rep, history) => {
  updateMetrics(rep, history);
  addRepRow(rep);
  showToast(`렙 ${rep.repNumber} ✓  ${rep.concentricDuration}s — RPE ${rep.rpe}`);
});

// ═══════════════════════════════════════════════════════════
// MEDIAPIPE
// ═══════════════════════════════════════════════════════════
async function initMediaPipe(){
  setStatus('모델 파일 다운로드 중…');
  try{
    const vision=await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm'
    );
    setStatus('포즈 추적기 초기화 중…');
    poseLandmarker=await PoseLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate:'GPU',
      },
      runningMode:'VIDEO',numPoses:1,
      minPoseDetectionConfidence:0.55,
      minPosePresenceConfidence:0.55,
      minTrackingConfidence:0.55,
    });
    drawingUtils=new DrawingUtils(ctx);
    setStatus('카메라 권한 요청 중…');
    await startCamera();
    loadScr.style.display='none';
  }catch(e){
    setStatus('오류: '+e.message);
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════
async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode,width:{ideal:640},height:{ideal:480},frameRate:{ideal:30}},
    audio:false,
  });
  video.srcObject=stream;
  // Mirror only front-facing camera
  video.style.transform=facingMode==='user'?'scaleX(-1)':'none';
  await new Promise(res=>video.onloadedmetadata=res);
  resizeCanvas();
  updateCamButtons();
}

function resizeCanvas(){
  canvas.width=video.videoWidth||video.clientWidth;
  canvas.height=video.videoHeight||video.clientHeight;
  canvas.style.width='100%';canvas.style.height='100%';
}

function updateCamButtons(){
  $('#btn-cam-front').classList.toggle('active',facingMode==='user');
  $('#btn-cam-rear').classList.toggle('active',facingMode==='environment');
}

// ═══════════════════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════════════════
function startCountdown(){
  if(countingDown) return;
  countingDown=true;
  btnStart.disabled=true;
  let n=COUNTDOWN_SEC;
  countdownNum.textContent=n;
  countdownOverlay.classList.add('visible');

  const tick=setInterval(()=>{
    n--;
    if(n>0){
      countdownNum.textContent=n;
    } else {
      clearInterval(tick);
      countdownOverlay.classList.remove('visible');
      countingDown=false;
      btnStart.disabled=false;
      // Actually start tracking
      tracking=true;
      btnStart.textContent='⏸ 세트 중지';
      detectLoop();
    }
  },1000);
}

// ═══════════════════════════════════════════════════════════
// DETECTION LOOP
// ═══════════════════════════════════════════════════════════
function detectLoop(){
  if(!tracking){rafId=null;return}
  rafId=requestAnimationFrame(detectLoop);
  if(video.readyState<2||video.currentTime===lastVideoTime) return;
  lastVideoTime=video.currentTime;
  resizeCanvas();
  const now=performance.now();
  const result=poseLandmarker.detectForVideo(video,now);
  const lm=result?.landmarks?.[0];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(lm){
    // Draw skeleton
    drawingUtils.drawLandmarks(lm,{
      radius:3,color:'rgba(232,255,71,0.7)',fillColor:'rgba(232,255,71,0.3)',lineWidth:1
    });
    drawingUtils.drawConnectors(lm,PoseLandmarker.POSE_CONNECTIONS,{
      color:'rgba(255,255,255,0.18)',lineWidth:1.5
    });
    const live=tracker.update(lm,now);
    if(live) renderOverlay(live,lm);
  } else {
    updatePhaseUI('WAITING');
  }
}

// ═══════════════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════════════
function renderOverlay(live,lm){
  const W=canvas.width,H=canvas.height;
  const px=l=>({x:l.x*W,y:l.y*H});

  // Depth line at knee height
  const kneeY=((lm[LM.KNEE_L].y+lm[LM.KNEE_R].y)/2)*H;
  ctx.save();
  ctx.setLineDash([8,5]);
  ctx.lineWidth=1.5;
  ctx.strokeStyle=live.atDepth?'#e8ff47':'rgba(255,61,61,0.8)';
  ctx.beginPath();ctx.moveTo(0,kneeY);ctx.lineTo(W,kneeY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='bold 10px "Barlow Condensed",sans-serif';
  ctx.fillStyle=live.atDepth?'#e8ff47':'rgba(255,61,61,0.9)';
  ctx.fillText(live.atDepth?'DEPTH ✓':'DEPTH LINE',8,kneeY-5);
  ctx.restore();

  // Knee angle arcs
  drawAngleArc(ctx,px(lm[23]),px(lm[25]),px(lm[27]),live.kneeAngleL,'#00e5c8');
  drawAngleArc(ctx,px(lm[24]),px(lm[26]),px(lm[28]),live.kneeAngleR,'#00e5c8');

  // Hip dot
  const hipPx=px(mid(lm[23],lm[24]));
  ctx.save();
  ctx.beginPath();ctx.arc(hipPx.x,hipPx.y,6,0,Math.PI*2);
  ctx.fillStyle=live.atDepth?'#e8ff47':'rgba(255,255,255,0.6)';
  ctx.fill();
  ctx.restore();

  updatePhaseUI(live.phase);
  kneeVal.textContent=live.kneeAngle?live.kneeAngle.toFixed(1)+'°':'—°';
}

function drawAngleArc(ctx,hip,knee,ankle,deg,color){
  if(!hip||!knee||!ankle) return;
  const toHip={x:hip.x-knee.x,y:hip.y-knee.y};
  const toAnk={x:ankle.x-knee.x,y:ankle.y-knee.y};
  const a1=Math.atan2(toHip.y,toHip.x),a2=Math.atan2(toAnk.y,toAnk.x);
  const r=22;
  ctx.save();
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(knee.x,knee.y,r,a1,a2);ctx.stroke();
  const amid=(a1+a2)/2;
  ctx.font='bold 11px "JetBrains Mono",monospace';
  ctx.fillStyle=color;
  ctx.fillText(`${deg.toFixed(0)}°`,knee.x+r*1.3*Math.cos(amid)-10,knee.y+r*1.3*Math.sin(amid)+4);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════════════════
const PHASE_LABELS={WAITING:'대기 중',DESCENDING:'내려가는 중',DEPTH:'DEPTH ✓',ASCENDING:'올라가는 중'};
function updatePhaseUI(phase){
  phaseRib.textContent=PHASE_LABELS[phase]??phase;
  phaseRib.className='phase-'+phase.toLowerCase();
}

function updateMetrics(rep,history){
  mReps.textContent=rep.repNumber;
  mTime.textContent=rep.concentricDuration.toFixed(2);
  mVloss.textContent=rep.velocityLoss.toFixed(1)+'%';
  const mean=history.reduce((s,r)=>s+r.concentricDuration,0)/history.length;
  mMean.textContent=mean.toFixed(2);
  mVloss.className='metric-val '+(rep.velocityLoss>=25?'danger':rep.velocityLoss>=15?'':'teal');
  const pct=Math.min(100,((rep.rpe-6)/4)*100);
  rpeFill.style.width=pct+'%';
  rpeFill.style.background=rep.rpe>=9?'#ff3d3d':rep.rpe>=8?'#ffc107':'#e8ff47';
  rpeValue.textContent=rep.rpe;
  rpeDesc.textContent=rep.rpeLabel??'';
}

function addRepRow(rep){
  const tr=document.createElement('tr');
  const cls=rep.rpe>=9?'rpe-high':rep.rpe>=8?'rpe-med':'rpe-ok';
  tr.innerHTML=`<td>Rep ${rep.repNumber}</td><td>${rep.concentricDuration.toFixed(3)}</td><td>${rep.kneeAngleAtDepth.toFixed(1)}°</td><td>${rep.velocityLoss.toFixed(1)}%</td><td class="${cls}">${rep.rpe}</td>`;
  repTbody.prepend(tr);
}

function saveCurrentSet(){
  const history=tracker.repHistory;
  if(!history.length) return;
  const avg=(history.reduce((s,r)=>s+r.concentricDuration,0)/history.length).toFixed(3);
  const maxRpe=Math.max(...history.map(r=>r.rpe));
  const now=new Date();
  const session={
    date:now.toLocaleDateString('ko-KR'),
    time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    weight:weightKg?`${weightKg}${weightUnit}`:'',
    repCount:history.length,
    avgDuration:avg,
    maxRpe,
    reps:history,
  };
  saveSession(session);
  renderFullHistory();
}

let toastTimer;
function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2800);
}
function setStatus(msg){loadStat.textContent=msg}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
btnStart.addEventListener('click',()=>{
  if(!poseLandmarker) return;
  if(tracking){
    // Stop
    tracking=false;
    cancelAnimationFrame(rafId);
    btnStart.textContent='▶ 세트 시작';
    saveCurrentSet();
    showToast('세트 저장 완료 ✓');
  } else {
    // Countdown then start
    startCountdown();
  }
});

btnReset.addEventListener('click',()=>{
  tracking=false;
  cancelAnimationFrame(rafId);
  tracker.resetSet();
  repTbody.innerHTML='';
  mReps.textContent='0';mTime.textContent='—';mVloss.textContent='0%';mMean.textContent='—';
  rpeValue.textContent='—';rpeDesc.textContent='—';rpeFill.style.width='0%';
  btnStart.textContent='▶ 세트 시작';
  updatePhaseUI('WAITING');
  showToast('세트 초기화 완료');
});

$('#btn-cam-front').addEventListener('click',async()=>{
  if(facingMode==='user') return;
  facingMode='user';
  try{await startCamera();showToast('전면 카메라');}
  catch{showToast('카메라 전환 실패');}
});
$('#btn-cam-rear').addEventListener('click',async()=>{
  if(facingMode==='environment') return;
  facingMode='environment';
  try{await startCamera();showToast('후면 카메라');}
  catch{showToast('카메라 전환 실패');}
});

// Weight input
weightInput.addEventListener('input',()=>{
  const v=parseFloat(weightInput.value);
  if(!isNaN(v)&&v>0){
    weightKg=weightUnit==='kg'?v:+(v*0.453592).toFixed(1);
    weightDisplay.textContent=`${v} ${weightUnit}`;
  } else {
    weightKg=null;
    weightDisplay.textContent=`— ${weightUnit}`;
  }
});

document.querySelectorAll('.unit-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    weightUnit=btn.dataset.unit;
    // Convert displayed value
    const v=parseFloat(weightInput.value);
    if(!isNaN(v)&&v>0){
      const converted=weightUnit==='kg'?+(v*0.453592).toFixed(1):+(v*2.20462).toFixed(1);
      weightInput.value=converted;
      weightKg=weightUnit==='kg'?converted:+(converted*0.453592).toFixed(1);
      weightDisplay.textContent=`${converted} ${weightUnit}`;
    }
  });
});

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab=btn.dataset.tab;
    $('#tab-current').classList.toggle('visible',tab==='current');
    $('#tab-history').classList.toggle('visible',tab==='history');
    if(tab==='history') renderFullHistory();
  });
});

window.addEventListener('resize',resizeCanvas);

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
renderFullHistory();
initMediaPipe();
</script>
</body>
</html>
