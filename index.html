<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>LIFTIQ — Squat Tracker</title>
<link rel="manifest" href="manifest.json" />

<style>
/* ── Design tokens ─────────────────────────────────────────────────
   Palette:
     #0a0a0a  void-black   (background)
     #111318  surface      (panels)
     #1c1f27  raised       (cards)
     #e8ff47  volt         (primary accent — like chalk on a weightroom board)
     #ff3d3d  danger       (depth fail / warnings)
     #00e5c8  teal         (secondary data)
     #888ca0  muted        (labels)
   Type:
     "Barlow Condensed" — display / metrics (athletic, compressed)
     "Inter"            — body / labels
     "JetBrains Mono"   — live data / numbers
   Signature element: the RPE bar — a raw chalk-tally aesthetic
   that animates like a loading bar being drawn by hand.
─────────────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:    #0a0a0a;
  --surface: #111318;
  --raised:  #1c1f27;
  --border:  #2a2e3a;
  --volt:    #e8ff47;
  --danger:  #ff3d3d;
  --teal:    #00e5c8;
  --muted:   #888ca0;
  --text:    #e8eaf0;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--void);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout shell ─────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 48px 1fr auto;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── Top bar ──────────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 10;
}
#logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--volt);
}
#logo span { color: var(--text); }
#cam-toggle {
  background: var(--raised);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 18px;
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, border-color 0.2s;
}
#cam-toggle:hover { color: var(--volt); border-color: var(--volt); }

/* ── Camera view ──────────────────────────────────────────────── */
#camera-wrap {
  position: relative;
  background: #000;
  overflow: hidden;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transform: scaleX(-1); /* mirror for front-facing */
}
#video.side-cam { transform: none; }
#overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ── Phase ribbon ─────────────────────────────────────────────── */
#phase-ribbon {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 4px;
  background: rgba(10,10,10,0.7);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: color 0.15s, border-color 0.15s;
  backdrop-filter: blur(6px);
  pointer-events: none;
}
#phase-ribbon.phase-descending { color: #ffc107; border-color: #ffc107; }
#phase-ribbon.phase-depth      { color: var(--volt); border-color: var(--volt); }
#phase-ribbon.phase-ascending  { color: var(--teal); border-color: var(--teal); }

/* ── Depth line on canvas (drawn via JS) ─────────────────────── */

/* ── Bottom panel ─────────────────────────────────────────────── */
#panel {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 16px calc(14px + var(--safe-bottom));
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Big metrics row ──────────────────────────────────────────── */
#metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.metric-card {
  background: var(--raised);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px 8px;
  text-align: center;
}
.metric-val {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 28px;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.01em;
}
.metric-val.volt { color: var(--volt); }
.metric-val.teal { color: var(--teal); }
.metric-val.danger { color: var(--danger); }
.metric-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

/* ── RPE bar (signature element) ─────────────────────────────── */
#rpe-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#rpe-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
#rpe-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
#rpe-value {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 20px;
  color: var(--volt);
}
#rpe-desc {
  font-size: 11px;
  color: var(--muted);
}
#rpe-track {
  height: 10px;
  background: var(--raised);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
/* Chalk tally marks effect via repeating gradient */
#rpe-track::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 18px,
    rgba(0,0,0,0.35) 18px,
    rgba(0,0,0,0.35) 20px
  );
  pointer-events: none;
}
#rpe-fill {
  height: 100%;
  width: 0%;
  background: var(--volt);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s;
}

/* ── Rep history table ────────────────────────────────────────── */
#history-wrap {
  max-height: 110px;
  overflow-y: auto;
  border-radius: 6px;
  border: 1px solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#rep-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 11px;
}
#rep-table thead th {
  position: sticky;
  top: 0;
  background: var(--raised);
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--font-body);
  font-weight: 600;
  padding: 5px 8px;
  text-align: right;
  border-bottom: 1px solid var(--border);
}
#rep-table thead th:first-child { text-align: left; }
#rep-table tbody tr { transition: background 0.15s; }
#rep-table tbody tr:hover { background: var(--raised); }
#rep-table tbody td {
  padding: 5px 8px;
  text-align: right;
  color: var(--text);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
#rep-table tbody td:first-child { text-align: left; color: var(--muted); }
#rep-table tbody td.rpe-high { color: var(--danger); }
#rep-table tbody td.rpe-med  { color: #ffc107; }
#rep-table tbody td.rpe-ok   { color: var(--teal); }

/* ── Action buttons ───────────────────────────────────────────── */
#actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}
#btn-start {
  background: var(--volt);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.06em;
  padding: 12px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
#btn-start:active { transform: scale(0.98); opacity: 0.85; }
#btn-reset {
  background: var(--raised);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 13px;
  padding: 12px 16px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
#btn-reset:hover { color: var(--danger); border-color: var(--danger); }

/* ── Loading / permission screen ─────────────────────────────── */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
}
#loading-logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 48px;
  letter-spacing: 0.1em;
  color: var(--volt);
}
#loading-logo span { color: var(--text); }
#loading-status {
  font-size: 13px;
  color: var(--muted);
  font-family: var(--font-mono);
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--volt);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--raised);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  padding: 10px 18px;
  border-radius: 8px;
  white-space: nowrap;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
  opacity: 0;
  z-index: 200;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Knee angle chip ──────────────────────────────────────────── */
#knee-chip {
  position: absolute;
  bottom: 12px; left: 12px;
  background: rgba(10,10,10,0.72);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  backdrop-filter: blur(6px);
  pointer-events: none;
}
#knee-chip .kval {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--teal);
}
#knee-chip .klabel {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 1px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_wasm_internal.js" crossorigin="anonymous"></script>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// Import MediaPipe Tasks-Vision
// ─────────────────────────────────────────────────────────────────────────────
import {
  PoseLandmarker,
  FilesetResolver,
  DrawingUtils,
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm';

// ═══════════════════════════════════════════════════════════════════════════════
// SQUAT TRACKER — inline (no separate file needed)
// ═══════════════════════════════════════════════════════════════════════════════

const LM = { HIP_L:23, HIP_R:24, KNEE_L:25, KNEE_R:26, ANKLE_L:27, ANKLE_R:28 };
const HIP_BELOW_KNEE_MARGIN = 0.012;

const RPE_TABLE = [
  { loss:0,  rpe:6.0, label:'매우 쉬움' },
  { loss:5,  rpe:6.5, label:'쉬움' },
  { loss:10, rpe:7.0, label:'보통' },
  { loss:15, rpe:7.5, label:'조금 힘듦' },
  { loss:20, rpe:8.0, label:'힘듦' },
  { loss:25, rpe:8.5, label:'많이 힘듦' },
  { loss:30, rpe:9.0, label:'거의 한계' },
  { loss:40, rpe:9.5, label:'한계 직전' },
  { loss:50, rpe:10,  label:'최대' },
];

const Phase = Object.freeze({
  WAITING:'WAITING', DESCENDING:'DESCENDING', DEPTH:'DEPTH', ASCENDING:'ASCENDING'
});

function angleDeg(A, B, C) {
  const BAx=A.x-B.x, BAy=A.y-B.y, BCx=C.x-B.x, BCy=C.y-B.y;
  const dot=BAx*BCx+BAy*BCy;
  const mag=Math.hypot(BAx,BAy)*Math.hypot(BCx,BCy);
  return mag===0 ? 180 : Math.acos(Math.max(-1,Math.min(1,dot/mag)))*(180/Math.PI);
}
function mid(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }

function lookupRPE(loss) {
  const t=RPE_TABLE;
  if(loss<=t[0].loss) return t[0];
  if(loss>=t[t.length-1].loss) return t[t.length-1];
  for(let i=1;i<t.length;i++){
    if(loss<=t[i].loss){
      const r=(loss-t[i-1].loss)/(t[i].loss-t[i-1].loss);
      return { rpe:+(t[i-1].rpe+r*(t[i].rpe-t[i-1].rpe)).toFixed(1), label:t[i-1].label };
    }
  }
  return t[t.length-1];
}

class SquatTracker {
  constructor(onRep){ this.onRep=onRep; this.repHistory=[]; this._reset(); }

  update(lm, now=performance.now()) {
    if(!lm||lm.length<29) return null;
    const hipL=lm[LM.HIP_L],hipR=lm[LM.HIP_R];
    const kneeL=lm[LM.KNEE_L],kneeR=lm[LM.KNEE_R];
    const ankleL=lm[LM.ANKLE_L],ankleR=lm[LM.ANKLE_R];
    const hip=mid(hipL,hipR), knee=mid(kneeL,kneeR);
    const kneeAngleL=angleDeg(hipL,kneeL,ankleL);
    const kneeAngleR=angleDeg(hipR,kneeR,ankleR);
    const kneeAngle=(kneeAngleL+kneeAngleR)/2;
    const atDepth=hip.y > knee.y+HIP_BELOW_KNEE_MARGIN;
    const hipDelta=hip.y-knee.y;
    this._fsm({hip,knee,kneeAngle,atDepth,hipDelta,now});
    this._prev={hip,knee,kneeAngle,atDepth,now};
    return {phase:this._phase,kneeAngleL,kneeAngleR,kneeAngle,atDepth,hipDelta,hip,knee,
            repCount:this.repHistory.length,setMean:+this._setMean.toFixed(3),
            lastRep:this.repHistory[this.repHistory.length-1]??null};
  }

  resetSet(){ this.repHistory=[]; this._reset(); }

  _reset(){
    this._phase=Phase.WAITING; this._prev=null;
    this._depthKneeAngle=180; this._depthHipDelta=0;
    this._ascentStart=null; this._lockout=0; this._setMean=0;
  }

  _fsm({hip,atDepth,hipDelta,kneeAngle,now}){
    switch(this._phase){
      case Phase.WAITING:
        if(this._prev && hip.y > this._prev.hip.y+0.003) this._phase=Phase.DESCENDING;
        break;
      case Phase.DESCENDING:
        if(atDepth){
          this._phase=Phase.DEPTH;
          this._depthKneeAngle=kneeAngle; this._depthHipDelta=hipDelta;
        }
        if(this._prev && hip.y < this._prev.hip.y-0.018) this._phase=Phase.WAITING;
        break;
      case Phase.DEPTH:
        if(hipDelta>this._depthHipDelta){
          this._depthHipDelta=hipDelta; this._depthKneeAngle=kneeAngle;
        }
        if(!atDepth){ this._phase=Phase.ASCENDING; this._ascentStart=now; this._lockout=0; }
        break;
      case Phase.ASCENDING:
        if(!atDepth){ this._lockout++; } else { this._phase=Phase.DEPTH; this._lockout=0; break; }
        if(this._lockout>=5){
          const dur=(now-this._ascentStart)/1000;
          if(dur>=0.15&&dur<=8) this._completeRep(dur,now);
          this._phase=Phase.WAITING; this._lockout=0;
        }
        break;
    }
  }

  _completeRep(dur,now){
    const n=this.repHistory.length+1;
    const prevMean=this._setMean;
    this._setMean=prevMean+(1/n)*(dur-prevMean);
    const lossPercent=n===1?0:Math.max(0,((dur-prevMean)/prevMean)*100);
    const {rpe,label}=lookupRPE(lossPercent);
    const rep={repNumber:n,concentricDuration:+dur.toFixed(3),
      kneeAngleAtDepth:+this._depthKneeAngle.toFixed(1),
      hipDepthDelta:+this._depthHipDelta.toFixed(4),
      velocityLoss:+lossPercent.toFixed(1),rpe,rpeLabel:label,timestamp:now};
    this.repHistory.push(rep);
    this.onRep?.(rep,[...this.repHistory]);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════════════════════
const $=s=>document.querySelector(s);
const video     = $('#video');
const canvas    = $('#overlay');
const ctx       = canvas.getContext('2d');
const loadScr   = $('#loading-screen');
const loadStat  = $('#loading-status');
const phaseRib  = $('#phase-ribbon');
const kneeVal   = $('#knee-val');
const mReps     = $('#m-reps');
const mTime     = $('#m-time');
const mVloss    = $('#m-vloss');
const mMean     = $('#m-mean');
const rpeValue  = $('#rpe-value');
const rpeDesc   = $('#rpe-desc');
const rpeFill   = $('#rpe-fill');
const repTbody  = $('#rep-tbody');
const btnStart  = $('#btn-start');
const btnReset  = $('#btn-reset');
const camToggle = $('#cam-toggle');
const toastEl   = $('#toast');

// ═══════════════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════════════
let poseLandmarker = null;
let drawingUtils   = null;
let stream         = null;
let tracking       = false;
let rafId          = null;
let facingMode     = 'user';  // 'user' = front, 'environment' = side/rear
let lastVideoTime  = -1;

// ═══════════════════════════════════════════════════════════════════════════════
// SquatTracker instance
// ═══════════════════════════════════════════════════════════════════════════════
const tracker = new SquatTracker((rep, history) => {
  updateMetrics(rep, history);
  addRepRow(rep);
  showToast(`렙 ${rep.repNumber} 완료 — ${rep.concentricDuration}s / RPE ${rep.rpe}`);
});

// ═══════════════════════════════════════════════════════════════════════════════
// MediaPipe init
// ═══════════════════════════════════════════════════════════════════════════════
async function initMediaPipe() {
  setStatus('모델 파일 다운로드 중…');
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm'
    );
    setStatus('포즈 추적기 초기화 중…');
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numPoses: 1,
      minPoseDetectionConfidence: 0.5,
      minPosePresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    drawingUtils = new DrawingUtils(ctx);
    setStatus('카메라 권한 요청 중…');
    await startCamera();
    loadScr.style.display = 'none';
  } catch(e) {
    setStatus('오류: ' + e.message);
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Camera
// ═══════════════════════════════════════════════════════════════════════════════
async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:30} },
    audio: false,
  });
  video.srcObject = stream;
  // Mirror only front-facing
  video.classList.toggle('side-cam', facingMode==='environment');
  await new Promise(res => video.onloadedmetadata = res);
  resizeCanvas();
}

function resizeCanvas() {
  canvas.width  = video.videoWidth  || video.clientWidth;
  canvas.height = video.videoHeight || video.clientHeight;
  canvas.style.width  = '100%';
  canvas.style.height = '100%';
}

// ═══════════════════════════════════════════════════════════════════════════════
// Detection loop
// ═══════════════════════════════════════════════════════════════════════════════
function detectLoop() {
  if(!tracking){ rafId=null; return; }
  rafId = requestAnimationFrame(detectLoop);

  if(video.readyState < 2 || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  resizeCanvas();
  const now = performance.now();
  const result = poseLandmarker.detectForVideo(video, now);
  const lm = result?.landmarks?.[0];

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if(lm) {
    // Draw skeleton
    drawingUtils.drawLandmarks(lm, {
      radius: 3,
      color: 'rgba(232,255,71,0.7)',
      fillColor: 'rgba(232,255,71,0.3)',
      lineWidth: 1,
    });
    drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
      color: 'rgba(255,255,255,0.2)',
      lineWidth: 1.5,
    });

    // Run tracker
    const live = tracker.update(lm, now);
    if(live) renderLiveOverlay(live, lm);
  } else {
    updatePhaseUI('WAITING');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Overlay drawing
// ═══════════════════════════════════════════════════════════════════════════════
function renderLiveOverlay(live, lm) {
  const W=canvas.width, H=canvas.height;
  const px=l=>({x:l.x*W, y:l.y*H});

  // ── Depth reference line (knee height) ──
  const kneeY = ((lm[LM.KNEE_L].y + lm[LM.KNEE_R].y) / 2) * H;
  ctx.save();
  ctx.setLineDash([8,5]);
  ctx.lineWidth=1.5;
  ctx.strokeStyle = live.atDepth ? '#e8ff47' : 'rgba(255,61,61,0.7)';
  ctx.beginPath(); ctx.moveTo(0,kneeY); ctx.lineTo(W,kneeY); ctx.stroke();
  // Label
  ctx.setLineDash([]);
  ctx.font='bold 10px "Barlow Condensed",sans-serif';
  ctx.letterSpacing='0.1em';
  ctx.fillStyle=live.atDepth?'#e8ff47':'rgba(255,61,61,0.9)';
  ctx.fillText(live.atDepth ? 'DEPTH ✓' : 'DEPTH LINE', 8, kneeY-5);
  ctx.restore();

  // ── Knee angle arcs ──
  drawAngleArc(ctx, px(lm[23]), px(lm[25]), px(lm[27]), live.kneeAngleL, '#00e5c8');
  drawAngleArc(ctx, px(lm[24]), px(lm[26]), px(lm[28]), live.kneeAngleR, '#00e5c8');

  // ── Hip marker ──
  const hipPx=px(mid(lm[23],lm[24]));
  ctx.save();
  ctx.beginPath();
  ctx.arc(hipPx.x,hipPx.y,6,0,Math.PI*2);
  ctx.fillStyle=live.atDepth?'#e8ff47':'rgba(255,255,255,0.6)';
  ctx.fill();
  ctx.restore();

  // ── UI updates ──
  updatePhaseUI(live.phase);
  kneeVal.textContent = live.kneeAngle ? live.kneeAngle.toFixed(1)+'°' : '—°';

  // Update live concentric timer while ascending
  if(live.phase==='ASCENDING' && live.lastRep===null && live._ascentStart) {
    // can't access private, skip — shown after rep complete
  }
}

function drawAngleArc(ctx, hip, knee, ankle, deg, color) {
  if(!hip||!knee||!ankle) return;
  const toHip  ={x:hip.x-knee.x,   y:hip.y-knee.y};
  const toAnk  ={x:ankle.x-knee.x, y:ankle.y-knee.y};
  const a1=Math.atan2(toHip.y,toHip.x);
  const a2=Math.atan2(toAnk.y,toAnk.x);
  const r=22;
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(knee.x,knee.y,r,a1,a2); ctx.stroke();
  const amid=(a1+a2)/2;
  ctx.font='bold 11px "JetBrains Mono",monospace';
  ctx.fillStyle=color;
  ctx.fillText(`${deg.toFixed(0)}°`, knee.x+r*1.3*Math.cos(amid)-10, knee.y+r*1.3*Math.sin(amid)+4);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
// UI updates
// ═══════════════════════════════════════════════════════════════════════════════
const PHASE_LABELS = {
  WAITING:'대기 중', DESCENDING:'내려가는 중', DEPTH:'DEPTH ✓', ASCENDING:'올라가는 중'
};
function updatePhaseUI(phase) {
  phaseRib.textContent = PHASE_LABELS[phase] ?? phase;
  phaseRib.className = 'phase-'+phase.toLowerCase();
}

function updateMetrics(rep, history) {
  mReps.textContent  = rep.repNumber;
  mTime.textContent  = rep.concentricDuration.toFixed(2);
  mVloss.textContent = rep.velocityLoss.toFixed(1)+'%';
  // Set mean from history
  const mean = history.reduce((s,r)=>s+r.concentricDuration,0)/history.length;
  mMean.textContent = mean.toFixed(2);

  // Velocity loss colour
  mVloss.className = 'metric-val '+(rep.velocityLoss>=25?'danger':rep.velocityLoss>=15?'':'teal');

  // RPE bar
  const pct = Math.min(100, ((rep.rpe-6)/4)*100);
  rpeFill.style.width = pct+'%';
  rpeFill.style.background = rep.rpe>=9?'#ff3d3d':rep.rpe>=8?'#ffc107':'#e8ff47';
  rpeValue.textContent = rep.rpe;
  rpeDesc.textContent  = rep.rpeLabel ?? '';
}

function addRepRow(rep) {
  const tr=document.createElement('tr');
  const rpeClass=rep.rpe>=9?'rpe-high':rep.rpe>=8?'rpe-med':'rpe-ok';
  tr.innerHTML=`
    <td>Rep ${rep.repNumber}</td>
    <td>${rep.concentricDuration.toFixed(3)}</td>
    <td>${rep.kneeAngleAtDepth.toFixed(1)}°</td>
    <td>${rep.velocityLoss.toFixed(1)}%</td>
    <td class="${rpeClass}">${rep.rpe}</td>
  `;
  repTbody.prepend(tr);
}

let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2800);
}
function setStatus(msg){ loadStat.textContent = msg; }

// ═══════════════════════════════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════════════════════════════
btnStart.addEventListener('click', () => {
  if(!poseLandmarker) return;
  tracking = !tracking;
  btnStart.textContent = tracking ? '⏸ 세트 중지' : '▶ 세트 시작';
  if(tracking) detectLoop();
});

btnReset.addEventListener('click', () => {
  tracker.resetSet();
  repTbody.innerHTML = '';
  mReps.textContent='0'; mTime.textContent='—';
  mVloss.textContent='0%'; mMean.textContent='—';
  rpeValue.textContent='—'; rpeDesc.textContent='—';
  rpeFill.style.width='0%';
  updatePhaseUI('WAITING');
  showToast('세트 초기화 완료');
});

camToggle.addEventListener('click', async () => {
  facingMode = facingMode==='user' ? 'environment' : 'user';
  camToggle.textContent = facingMode==='user' ? '⟳' : '↺';
  try { await startCamera(); showToast(facingMode==='user'?'정면 카메라':'측면 카메라'); }
  catch(e){ showToast('카메라 전환 실패'); }
});

window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════════════════════
initMediaPipe();
</script>
